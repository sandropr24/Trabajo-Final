<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login | Sistema de Herramientas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap + Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <!-- Fuente -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- TU CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="login-page">
    <div class="login-card">
      <div class="login-icon">
        <i class="bi bi-tools"></i>
      </div>

      <h1 class="login-title">Sistema de Herramientas</h1>
      <p class="login-subtitle">Inicia sesión para continuar</p>

      <form id="loginForm" class="login-form">
        <div>
          <label class="form-label-custom">Correo</label>
          <input
            type="email"
            id="correo"
            class="input-custom"
            placeholder="Ingrese su correo"
            required
          />
        </div>

        <div>
          <label class="form-label-custom">Contraseña</label>
          <input
            type="password"
            id="contraseña"
            class="input-custom"
            placeholder="Ingrese su contraseña"
            required
          />
        </div>

        <button type="submit" class="btn-save">
          <i class="bi bi-box-arrow-in-right"></i>
          Ingresar
        </button>
      </form>

      <div id="errorMsg" class="login-error"></div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>

<section>
  <div class="page-header">
    <div>
      <h1 class="page-title">Usuarios</h1>
      <p class="page-subtitle" id="totalUsuariosLabel">
        0 usuario(s) encontrado(s)
      </p>
    </div>

    <button class="btn-primary-action" id="btnNuevoUsuario">
      <i class="bi bi-plus-lg"></i>
      Nuevo usuario
    </button>
  </div>

  <div class="search-bar-row">
    <div class="search-input-wrap">
      <i class="bi bi-search search-icon"></i>
      <input
        type="text"
        class="search-input"
        id="searchUsuario"
        placeholder="Buscar usuario..."
      />
    </div>

    <button class="btn-icon-outline" id="btnRefreshUsuarios">
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>

  <div class="card-panel table-panel">
    <table class="table-custom usuarios-table">
      <thead>
        <tr>
          <th class="text-center">#</th>
          <th>Nombres completos</th>
          <th class="text-center">DNI</th>
          <th class="text-center">Turno</th>
          <th class="text-center">Estado</th>
          <th>Correo</th>
          <th class="text-center">Rol</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>

      <tbody id="bodyUsuarios"></tbody>
    </table>
  </div>
</section>

<div class="modal-overlay" id="modalUsuarioOverlay">
  <div class="modal-panel">
    <div class="modal-header-custom">
      <div>
        <div class="modal-title-custom" id="modalUsuarioTitle">
          Nuevo Usuario
        </div>
        <div class="modal-subtitle">Completa los datos del usuario</div>
      </div>

      <button id="btnCloseModalUsuario" class="btn-modal-close">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <input type="hidden" id="usuarioId" />

      <label class="form-label-custom">
        Nombres completos <span class="required">*</span>
      </label>
      <input type="text" id="uNombres" class="input-custom" />
      <div id="err-uNombres" class="field-error"></div>

      <label class="form-label-custom">
        DNI <span class="required">*</span>
      </label>
      <input type="text" id="uDni" class="input-custom" />
      <div id="err-uDni" class="field-error"></div>

      <label class="form-label-custom">
        Turno <span class="required">*</span>
      </label>
      <select id="uTurno" class="input-custom">
        <option value="">Seleccione turno</option>
        <option value="mañana">Mañana</option>
        <option value="tarde">Tarde</option>
        <option value="noche">Noche</option>
      </select>
      <div id="err-uTurno" class="field-error"></div>

      <label class="form-label-custom">
        Estado <span class="required">*</span>
      </label>
      <select id="uEstado" class="input-custom">
        <option value="vigente">Vigente</option>
        <option value="baja">Baja</option>
      </select>
      <div id="err-uEstado" class="field-error"></div>

      <label class="form-label-custom">
        Rol <span class="required">*</span>
      </label>
      <select id="uRol" class="input-custom">
        <option value="">Seleccione rol</option>
        <option value="1">Administrador</option>
        <option value="2">Almacenero</option>
        <option value="3">Supervisor</option>
        <option value="4">Técnico</option>
        <option value="5">Invitado</option>
      </select>
      <div id="err-uRol" class="field-error"></div>

      <label class="form-label-custom"> Correo </label>
      <input type="email" id="uCorreo" class="input-custom" />
      <div id="err-uCorreo" class="field-error"></div>

      <label class="form-label-custom"> Contraseña </label>
      <input type="password" id="uPassword" class="input-custom" />
      <div id="err-uPassword" class="field-error"></div>
    </div>

    <div class="modal-footer-custom">
      <button id="btnCancelUsuario" class="btn-cancel">Cancelar</button>

      <button id="btnSaveUsuario" class="btn-save">
        <span id="btnSaveUsuarioText">Guardar</span>
        <span id="btnSaveUsuarioSpinner" class="spinner-sm d-none"></span>
      </button>
    </div>
  </div>
</div>

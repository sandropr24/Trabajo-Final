<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolControl | Sistema de Herramientas</title>

  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <i class="bi bi-tools"></i>
      </div>

      <div>
        <div class="brand-name">ToolControl</div>
        <div class="brand-sub">Sistema de herramientas</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>

      <a href="#" class="nav-item" data-page="dashboard" data-role="Administrador,Almacenero,Supervisor,Técnico,Invitado">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
        <span class="nav-badge" id="badge-dashboard">0</span>
      </a>

      <div class="nav-section-label">Gestión</div>

      <a href="#" class="nav-item" data-page="herramientas" data-role="Administrador,Almacenero,Supervisor">
        <i class="bi bi-tools"></i>
        <span>Herramientas</span>
        <span class="nav-badge" id="badge-herramientas">0</span>
      </a>

      <a href="#" class="nav-item" data-page="usuarios" data-role="Administrador">
        <i class="bi bi-people"></i>
        <span>Usuarios</span>
        <span class="nav-badge" id="badge-usuarios">0</span>
      </a>

      <a href="#" class="nav-item" data-page="prestamos" data-role="Administrador,Almacenero,Supervisor,Técnico">
        <i class="bi bi-clipboard-data"></i>
        <span>Préstamos</span>
        <span class="nav-badge" id="badge-prestamos">0</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
        <div class="avatar-xs">
          <i class="bi bi-person"></i>
        </div>

        <div>
          <div id="sidebarUserName" style="color: white; font-size: 13px; font-weight: 600;">
            Usuario
          </div>
          <div id="sidebarUserRole" style="color: var(--sidebar-text); font-size: 11px;">
            Rol
          </div>
        </div>
      </div>

      <button id="btnLogout" class="btn-cancel" style="width: 100%;">
        <i class="bi bi-box-arrow-right"></i>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title" id="topbarTitle">Dashboard</div>

      <div class="topbar-actions">
        <div class="status-dot"></div>
        <span class="text-sm text-muted">Conectado</span>
      </div>
    </header>

    <div class="page-wrapper" id="pageContainer">
      <!-- Aquí se cargan las vistas sin recargar la página -->
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/herramientas.js"></script>
  <script src="js/modules/usuarios.js"></script>
  <script src="js/modules/prestamos.js"></script>
  <script src="js/router.js"></script>
</body>
</html>
